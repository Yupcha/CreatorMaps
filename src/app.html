<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta
      name="description"
      content="Yupcha Maps turns any place, route, or dataset in India into a beautiful, shareable reel or poster — cinematic map videos, data reels, and HD wallpapers, free in your browser."
    />
    <meta
      name="keywords"
      content="india map, map reels, cinematic map video, content creator maps, data visualization india, choropleth, map poster maker, travel reel, maplibre, deck.gl, open source maps"
    />
    <meta name="author" content="Yupcha" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="canonical" href="https://maps.yupcha.com/" />
    <title>Yupcha Maps — Create cinematic map reels & posters of India</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Yupcha Maps" />
    <meta property="og:url" content="https://maps.yupcha.com/" />
    <meta property="og:title" content="Yupcha Maps — Create cinematic map reels & posters of India" />
    <meta
      property="og:description"
      content="Turn any place, route, or dataset in India into a shareable reel or poster. Roots, trip & data reels plus HD poster export — free, in your browser."
    />
    <meta property="og:image" content="https://maps.yupcha.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yupcha Maps — Create cinematic map reels & posters of India" />
    <meta
      name="twitter:description"
      content="Turn any place, route, or dataset in India into a shareable reel or poster — free, in your browser."
    />
    <meta name="twitter:image" content="https://maps.yupcha.com/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
